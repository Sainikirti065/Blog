{% extends 'base.html' %}

{% block content %}

    <h2 class="text-xl mb-4">Are you sure you want to delete?</h2>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded">
            Yes Delete
        </button>
    </form>

</div>

{% endblock %}
